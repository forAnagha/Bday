<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why You're Amazing 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#FFF5FA;color:#3A2A4A;min-height:100vh;overflow-x:hidden}
  .stars-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .fstar{position:absolute;bottom:-50px;animation:floatstar linear infinite;opacity:0}
  @keyframes floatstar{0%{transform:translateY(0) rotate(0);opacity:0}10%{opacity:.7}90%{opacity:.4}100%{transform:translateY(-110vh) rotate(360deg);opacity:0}}
  .page-header{position:relative;z-index:1;background:linear-gradient(135deg,#FFD6EE 0%,#E5D5FF 100%);padding:60px 20px 50px;text-align:center;overflow:hidden}
  .page-header::after{content:'🌟';position:absolute;font-size:200px;opacity:.05;bottom:-40px;left:-20px}
  .back-btn{position:absolute;top:20px;left:20px;background:white;border:2px solid #FFB3CD;border-radius:99px;padding:8px 20px;color:#FF6B9D;font-weight:700;text-decoration:none;font-size:14px;transition:transform .2s}
  .back-btn:hover{transform:translateX(-4px)}
  .page-title{font-family:'Playfair Display',serif;font-size:clamp(30px,6vw,56px);color:#FF6B9D;margin-bottom:12px}
  .page-sub{color:#7B5EA7;font-size:17px;max-width:500px;margin:0 auto}
  .hero-number{position:relative;z-index:1;text-align:center;padding:60px 20px 20px}
  .big-num{font-family:'Playfair Display',serif;font-size:clamp(80px,20vw,160px);font-weight:700;background:linear-gradient(135deg,#FF6B9D,#C77DFF,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;animation:numPop 1s ease .3s both}
  .big-num-label{font-size:20px;color:#7B5EA7;margin-top:8px}
  @keyframes numPop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
  .reasons-wrap{position:relative;z-index:1;max-width:960px;margin:40px auto;padding:0 20px 80px}
  .filter-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:36px}
  .filter-btn{background:white;border:2px solid #FFB3CD;border-radius:99px;padding:8px 20px;color:#FF6B9D;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
  .filter-btn:hover,.filter-btn.active{background:linear-gradient(135deg,#FF6B9D,#C77DFF);color:white;border-color:transparent}
  .reasons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
  .reason-item{background:white;border:2px solid #FFE0EF;border-radius:18px;padding:22px 18px;transition:transform .25s,box-shadow .25s,border-color .25s;animation:cardIn .5s ease both}
  .reason-item:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 10px 28px rgba(255,107,157,.18);border-color:#FF6B9D}
  .reason-num{font-size:12px;font-weight:700;color:#C77DFF;letter-spacing:1px;margin-bottom:8px}
  .reason-icon{font-size:28px;margin-bottom:10px;display:block}
  .reason-text{font-size:14px;color:#4A3060;line-height:1.55;font-weight:600}
  .burst-wrap{position:relative;z-index:1;text-align:center;padding:20px 20px 40px}
  .burst-btn{background:linear-gradient(135deg,#FF6B9D,#C77DFF);color:white;border:none;border-radius:99px;padding:18px 40px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 28px rgba(255,107,157,.38)}
  .burst-btn:hover{transform:scale(1.06)}
  .burst-btn:active{transform:scale(.95)}
  .floating-star{position:fixed;pointer-events:none;z-index:500;animation:starburst 1.4s ease forwards;font-size:22px}
  @keyframes starburst{0%{opacity:1;transform:translate(0,0) scale(.5)}50%{opacity:1;transform:translate(var(--tx),var(--ty)) scale(1.3)}100%{opacity:0;transform:translate(calc(var(--tx)*1.6),calc(var(--ty)*1.6)) scale(.6)}}
  .bottom-nav{position:relative;z-index:1;padding:0 20px 60px;display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;border-radius:99px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;text-decoration:none;border:none;transition:transform .2s}
  .btn:hover{transform:translateY(-3px)}
  .btn-primary{background:linear-gradient(135deg,#FF6B9D,#C77DFF);color:white}
  .btn-peach{background:linear-gradient(135deg,#FFB347,#FF6B9D);color:white}
  .btn-blue{background:linear-gradient(135deg,#56CCF2,#2F80ED);color:white}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="stars-wrap" id="starsWrap"></div>
<div class="page-header">
  <a href="index.html" class="back-btn">← Back Home</a>
  <h1 class="page-title">🌟 Why You're Amazing</h1>
  <p class="page-sub">A list of all the things that make you — undeniably, absolutely, certifiably — incredible.</p>
</div>
<div class="hero-number">
  <div class="big-num">50</div>
  <div class="big-num-label">reasons you're legendary 🏆</div>
</div>
<div class="reasons-wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterReasons('all',this)">🌟 All</button>
    <button class="filter-btn" onclick="filterReasons('personality',this)">✨ Personality</button>
    <button class="filter-btn" onclick="filterReasons('skills',this)">💪 Skills</button>
    <button class="filter-btn" onclick="filterReasons('vibes',this)">🎉 Vibes</button>
    <button class="filter-btn" onclick="filterReasons('moments',this)">🏆 Moments</button>
  </div>
  <div class="reasons-grid" id="reasonsGrid"></div>
</div>
<div class="burst-wrap">
  <button class="burst-btn" onclick="burstStars(this)">🌟 Celebrate Her!!</button>
</div>
<div class="bottom-nav">
  <a href="index.html" class="btn btn-primary">🏠 Home</a>
  <a href="memories.html" class="btn btn-peach">📸 Memories</a>
  <a href="wishes.html" class="btn btn-blue">🎁 Wishes</a>
</div>
<script>
const reasons = [
  {cat:'personality',icon:'😂',text:'Her laugh is genuinely contagious — the whole room changes'},
  {cat:'personality',icon:'🧠',text:'Scary smart. The kind that makes you think differently about everything'},
  {cat:'personality',icon:'🌻',text:'Lights up every room she walks into, effortlessly'},
  {cat:'personality',icon:'🦋',text:'Completely, unapologetically herself — zero filters needed'},
  {cat:'personality',icon:'🌙',text:'Her perspective on things is always the most interesting in the room'},
  {cat:'personality',icon:'🌊',text:'Calm under pressure. A total anchor when things get chaotic'},
  {cat:'personality',icon:'🔥',text:'Passionate about the things she cares about — fiercely so'},
  {cat:'personality',icon:'🌺',text:'Kindness that\'s genuine, not performed. Rare and real'},
  {cat:'personality',icon:'⭐',text:'Confident and grounded at the same time — not easy to pull off'},
  {cat:'personality',icon:'💎',text:'The kind of person you meet once and never forget'},
  {cat:'skills',icon:'🎯',text:'Gets things done. Somehow always figures it out'},
  {cat:'skills',icon:'📚',text:'Always learning, always growing — never settling'},
  {cat:'skills',icon:'🎨',text:'Creative in ways that genuinely surprise you every time'},
  {cat:'skills',icon:'🗣️',text:'Can talk to literally anyone — a true social superpower'},
  {cat:'skills',icon:'💡',text:'Her ideas are always the ones people end up going with'},
  {cat:'skills',icon:'🎭',text:'Can read a room in seconds — emotional intelligence is elite'},
  {cat:'skills',icon:'🏃',text:'When she commits to something, she goes all in. Every time'},
  {cat:'skills',icon:'🧩',text:'Problem-solver. The person you call when it\'s actually serious'},
  {cat:'skills',icon:'📸',text:'Makes everything look good. Eye for aesthetics is next level'},
  {cat:'skills',icon:'🎶',text:'Music taste is always exactly right — no skips on her playlist'},
  {cat:'vibes',icon:'🌈',text:'Her energy just makes everything more fun. Fact.'},
  {cat:'vibes',icon:'☀️',text:'The mood lifter. Even bad days get better around her'},
  {cat:'vibes',icon:'🧃',text:'Zero drama. Maximum good energy. Everyone needs this'},
  {cat:'vibes',icon:'🎊',text:'Turns ordinary Tuesdays into events worth remembering'},
  {cat:'vibes',icon:'🕶️',text:'Effortlessly cool in a way that can\'t be faked or taught'},
  {cat:'vibes',icon:'🌸',text:'Her excitement about things is genuinely infectious'},
  {cat:'vibes',icon:'🤩',text:'Makes the people around her feel more confident just by existing'},
  {cat:'vibes',icon:'🏖️',text:'Holiday energy all year round. It\'s a gift to everyone near her'},
  {cat:'vibes',icon:'🎈',text:'The person who makes the group better — in every group'},
  {cat:'vibes',icon:'💫',text:'Her presence is genuinely something you notice when it\'s not there'},
  {cat:'moments',icon:'🏆',text:'That time she was absolutely right and handled it with grace'},
  {cat:'moments',icon:'😂',text:'The laugh that wouldn\'t stop — still legendary'},
  {cat:'moments',icon:'🎤',text:'When she said that thing that everyone remembered for weeks'},
  {cat:'moments',icon:'🌧️',text:'Stayed calm when everything was going sideways — certified icon'},
  {cat:'moments',icon:'🎂',text:'Every birthday she\'s ever had — each one more iconic than the last'},
  {cat:'moments',icon:'✈️',text:'Every trip, every adventure — the best co-pilot always'},
  {cat:'moments',icon:'🎬',text:'The film she recommended that changed someone\'s life slightly'},
  {cat:'moments',icon:'🍕',text:'That food order that was somehow perfect — chef kiss'},
  {cat:'moments',icon:'🌅',text:'Was there for someone when it mattered most. Always.'},
  {cat:'moments',icon:'🎯',text:'Pulled something off that nobody else could have. Twice.'},
  {cat:'personality',icon:'🦁',text:'Brave in ways that aren\'t loud but are very, very real'},
  {cat:'skills',icon:'🤝',text:'Reliable. Shows up. Every single time — no excuses needed'},
  {cat:'vibes',icon:'🍀',text:'Lucky to know her. Anyone who does knows that\'s true'},
  {cat:'moments',icon:'🏅',text:'The time she carried the whole team and made it look easy'},
  {cat:'personality',icon:'🌍',text:'Makes the world a genuinely better place just by being in it'},
  {cat:'skills',icon:'🖊️',text:'Expresses herself in ways that actually land — rare talent'},
  {cat:'vibes',icon:'🎁',text:'Has this way of making people feel seen. Real superpower.'},
  {cat:'moments',icon:'🌟',text:'The compliment she gave once that someone still thinks about'},
  {cat:'personality',icon:'🏄',text:'Handles life\'s chaos with style. Honestly impressive.'},
  {cat:'moments',icon:'♾️',text:'Every single moment, honestly. The whole list could keep going.'},
];

function renderReasons(filter){
  const grid=document.getElementById('reasonsGrid');
  grid.innerHTML='';
  reasons.filter(r=>filter==='all'||r.cat===filter).forEach((r,i)=>{
    const el=document.createElement('div');
    el.className='reason-item';
    el.style.animationDelay=`${(i%20)*.04}s`;
    el.innerHTML=`<div class="reason-num">No. ${reasons.indexOf(r)+1}</div><span class="reason-icon">${r.icon}</span><div class="reason-text">${r.text}</div>`;
    grid.appendChild(el);
  });
}
function filterReasons(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReasons(cat);
}
renderReasons('all');

// Floating stars bg
const sw=document.getElementById('starsWrap');
const starEmojis=['⭐','🌟','✨','💫','🎊','🎉','🎈'];
for(let i=0;i<14;i++){
  const s=document.createElement('div');s.className='fstar';
  s.textContent=starEmojis[Math.floor(Math.random()*starEmojis.length)];
  s.style.cssText=`left:${Math.random()*95}%;animation-duration:${9+Math.random()*10}s;animation-delay:${-Math.random()*12}s;font-size:${16+Math.random()*18}px`;
  sw.appendChild(s);
}

function burstStars(btn){
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<24;i++){
    const s=document.createElement('div');s.className='floating-star';
    const angle=(i/24)*Math.PI*2, dist=80+Math.random()*130;
    s.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-delay:${Math.random()*.3}s`;
    s.textContent=starEmojis[Math.floor(Math.random()*starEmojis.length)];
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1800);
  }
}
</script>
</body>
</html>
